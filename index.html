<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>starforge — WebGPU N-body gravity sandbox</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #05050a; color: #dfe6ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    #gpu-canvas, #overlay-canvas {
      position: fixed; inset: 0; width: 100vw; height: 100vh; display: block;
    }
    #gpu-canvas { z-index: 0; }
    #overlay-canvas { z-index: 1; cursor: crosshair; }

    #hud {
      position: fixed; z-index: 2; top: 12px; left: 12px;
      display: flex; gap: 12px; align-items: center;
      padding: 8px 12px; border: 1px solid rgba(140,200,255,0.25);
      border-radius: 8px; background: rgba(10,12,24,0.6);
      backdrop-filter: blur(6px); font-size: 13px;
      user-select: none;
    }
    #hud button {
      font: inherit; color: #dfe6ff; cursor: pointer;
      background: rgba(140,200,255,0.12);
      border: 1px solid rgba(140,200,255,0.35);
      border-radius: 6px; padding: 4px 10px;
    }
    #hud button:hover { background: rgba(140,200,255,0.22); }
    #hud .stat { opacity: 0.85; }
    #hud .stat b { color: #8cc8ff; font-weight: 600; }
    #guide {
      position: fixed; z-index: 3; left: 50%; bottom: 70px; transform: translateX(-50%);
      width: min(560px, 92vw);
      border: 1px solid rgba(140,200,255,0.25); border-radius: 10px;
      background: rgba(10,12,24,0.62); backdrop-filter: blur(6px);
      font-size: 13px; color: #cdd8f3; user-select: none; overflow: hidden;
    }
    #guide-toggle {
      width: 100%; font: inherit; color: #cfe0ff; cursor: pointer;
      background: transparent; border: none; padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    #guide-toggle b { color: #fff; font-weight: 600; }
    #guide-toggle .chev { opacity: .7; transition: transform .2s ease; }
    #guide:not(.open) .chev { transform: rotate(-90deg); }
    #guide-body { padding: 0 13px 12px; display: grid; gap: 8px; }
    #guide:not(.open) #guide-body { display: none; }
    #guide-tool-desc { margin: 0; line-height: 1.7; opacity: .9; }
    #guide-controls {
      line-height: 1.8; opacity: .8; font-size: 12px;
      border-top: 1px solid rgba(140,200,255,0.14); padding-top: 8px;
    }
    #guide-controls b { color: #8cc8ff; font-weight: 600; }
    #controls {
      position: fixed; z-index: 2; top: 12px; right: 12px; width: 192px;
      display: flex; flex-direction: column; gap: 9px;
      padding: 11px 13px; border: 1px solid rgba(140,200,255,0.25);
      border-radius: 8px; background: rgba(10,12,24,0.6);
      backdrop-filter: blur(6px); font-size: 12px; user-select: none;
    }
    #controls .ctl-head { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #8cc8ff; opacity: .85; }
    #controls .ctl { display: flex; flex-direction: column; gap: 3px; }
    #controls .ctl-row { display: flex; justify-content: space-between; opacity: .88; }
    #controls .ctl-row b { color: #8cc8ff; font-weight: 600; font-variant-numeric: tabular-nums; }
    #controls input[type=range] { width: 100%; accent-color: #8cc8ff; margin: 0; }
    #toolbar {
      position: fixed; z-index: 2; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; padding: 6px;
      border: 1px solid rgba(140,200,255,0.25); border-radius: 10px;
      background: rgba(10,12,24,0.6); backdrop-filter: blur(6px); user-select: none;
    }
    #toolbar button {
      font: inherit; font-size: 13px; color: #cfe0ff; cursor: pointer;
      background: rgba(140,200,255,0.10); border: 1px solid rgba(140,200,255,0.28);
      border-radius: 7px; padding: 6px 12px;
    }
    #toolbar button:hover { background: rgba(140,200,255,0.20); }
    #toolbar button.active {
      background: rgba(140,200,255,0.30); border-color: rgba(180,220,255,0.7);
      color: #ffffff; box-shadow: 0 0 0 1px rgba(180,220,255,0.4) inset;
    }
    #fallback {
      position: fixed; inset: 0; z-index: 10; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      background: #05050a; color: #ff9d9d; font-size: 18px; line-height: 1.6;
    }

    /* HUD + hint are hidden while in the gallery, shown during immersion. */
    body.gallery-open #hud,
    body.gallery-open #guide,
    body.gallery-open #toolbar,
    body.gallery-open #controls { display: none; }

    /* ---- Gallery (展示室) — cinematic deep-space scene selector ---- */
    /* Refined system font stack (no CDN / Google Fonts). */
    #gallery {
      --ink: #eef2ff;
      --ink-soft: rgba(206, 216, 245, 0.66);
      --ink-faint: rgba(180, 192, 224, 0.42);
      --hair: rgba(150, 180, 255, 0.12);
      --space: #04040a;
      position: fixed; inset: 0; z-index: 5;
      overflow-y: auto; overflow-x: hidden;
      background:
        radial-gradient(1300px 900px at 78% -12%, rgba(74,52,140,0.30), transparent 58%),
        radial-gradient(1000px 800px at 6% 116%, rgba(20,64,128,0.26), transparent 58%),
        radial-gradient(700px 600px at 50% 48%, rgba(40,46,96,0.18), transparent 70%),
        var(--space);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      transition: opacity 480ms ease;
    }
    #gallery.hidden { opacity: 0; pointer-events: none; }

    /* --- atmospheric backdrop layers --- */
    .gallery-backdrop {
      position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .gallery-backdrop svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .bg-nebula { opacity: 0.9; }
    .bg-stars { position: absolute; inset: 0; }
    .bg-stars svg { animation: starTwinkle 9s ease-in-out infinite; }
    .bg-orbits {
      opacity: 0.55;
      transform-origin: 50% 50%;
      animation: orbitDrift 220s linear infinite;
    }
    .bg-body { filter: drop-shadow(0 0 6px currentColor); }
    .bg-body-a { animation: spin 90s linear infinite; transform-origin: 600px 600px; }
    .bg-body-b { animation: spin 58s linear infinite reverse; transform-origin: 600px 600px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes orbitDrift { to { transform: rotate(360deg); } }
    @keyframes starTwinkle { 0%,100% { opacity: 0.85; } 50% { opacity: 0.55; } }

    /* fade/lift the stage content in when the gallery is shown */
    body.gallery-open .gallery-stage { animation: stageIn 700ms cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes stageIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    .gallery-stage {
      position: relative; z-index: 1;
      min-height: 100%;
      display: flex; flex-direction: column;
      max-width: 1180px; margin: 0 auto;
      padding: clamp(40px, 8vh, 84px) clamp(22px, 6vw, 72px) clamp(28px, 5vh, 56px);
    }

    /* --- header --- */
    .gallery-header { margin-bottom: clamp(28px, 5vh, 52px); }
    .gallery-header .eyebrow {
      display: inline-flex; align-items: center; gap: 9px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase;
      color: var(--ink-soft);
      padding: 6px 13px; border: 1px solid var(--hair); border-radius: 999px;
      background: rgba(12,16,30,0.5); backdrop-filter: blur(6px);
    }
    .eyebrow-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #8cc8ff; box-shadow: 0 0 10px rgba(140,200,255,0.95);
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .gallery-header h1 {
      margin: 20px 0 0; font-weight: 700;
      font-size: clamp(40px, 9vw, 92px); line-height: 0.96;
      letter-spacing: -0.02em; color: #f4f7ff;
      text-shadow: 0 0 38px rgba(120,150,255,0.30);
    }
    .gallery-header .tagline {
      margin: 16px 0 0; max-width: 60ch;
      font-size: clamp(14px, 1.7vw, 17px); line-height: 1.6;
      color: var(--ink-soft); font-weight: 400;
    }
    .gallery-header .tagline-ja {
      color: var(--ink-faint); letter-spacing: 0.04em; font-size: 0.92em;
    }

    /* --- grid --- */
    .gallery-grid {
      flex: 1;
      display: grid; gap: clamp(14px, 1.6vw, 20px);
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      align-content: start;
    }

    .tile {
      position: relative; text-align: left; cursor: pointer;
      display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto 1fr auto;
      gap: 4px 16px;
      padding: 22px 22px 20px; min-height: 178px;
      color: var(--ink);
      font-family: inherit;
      background:
        linear-gradient(160deg, rgba(20,24,42,0.62), rgba(8,9,18,0.72));
      border: 1px solid rgba(var(--glow), 0.20);
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(7px);
      overflow: hidden;
      transition: transform 280ms cubic-bezier(0.16,1,0.3,1),
        box-shadow 320ms ease, border-color 320ms ease;
    }
    body.gallery-open .tile { animation: tileIn 620ms cubic-bezier(0.16,1,0.3,1) both; animation-delay: calc(var(--i) * 70ms + 120ms); }
    @keyframes tileIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

    /* directional accent glow that swells on hover */
    .tile::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(220px 180px at 0% 0%, rgba(var(--glow), 0.22), transparent 62%);
      opacity: 0.55; transition: opacity 320ms ease;
    }
    /* top hairline that picks up the accent */
    .tile::after {
      content: ""; position: absolute; left: 0; right: 0; top: 0; height: 1px; pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(var(--glow), 0.65), transparent);
      opacity: 0.35; transition: opacity 320ms ease;
    }
    .tile:hover, .tile:focus-visible {
      transform: translateY(-5px);
      border-color: rgba(var(--glow), 0.6);
      box-shadow:
        0 18px 50px rgba(0,0,0,0.5),
        0 0 0 1px rgba(var(--glow), 0.18),
        0 8px 36px rgba(var(--glow), 0.22);
      outline: none;
    }
    .tile:hover::before, .tile:focus-visible::before { opacity: 1; }
    .tile:hover::after, .tile:focus-visible::after { opacity: 0.9; }
    /* explicit a11y focus ring (distinct from hover) */
    .tile:focus-visible { box-shadow: 0 0 0 2px var(--space), 0 0 0 4px rgba(var(--glow), 0.85), 0 18px 50px rgba(0,0,0,0.5); }
    .tile:active { transform: translateY(-2px) scale(0.992); }

    .tile-glyph {
      grid-column: 1; grid-row: 1;
      width: 38px; height: 38px; display: grid; place-items: center;
      border-radius: 11px;
      color: rgb(var(--glow));
      background: radial-gradient(circle at 35% 30%, rgba(var(--glow), 0.30), rgba(var(--glow), 0.06) 70%);
      box-shadow: inset 0 0 0 1px rgba(var(--glow), 0.30), 0 0 22px rgba(var(--glow), 0.22);
    }
    .tile-glyph svg { width: 24px; height: 24px; }
    .tile-index {
      grid-column: 2; grid-row: 1; justify-self: end; align-self: start;
      font-variant-numeric: tabular-nums;
      font-size: 11px; letter-spacing: 0.22em; color: var(--ink-faint);
    }
    .tile-body { grid-column: 1 / -1; grid-row: 2; display: flex; flex-direction: column; gap: 3px; margin-top: 12px; }
    .tile-name { font-size: 18px; font-weight: 650; letter-spacing: -0.01em; color: #f1f5ff; }
    .tile-name-ja { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.12em; }
    .tile-desc { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; margin-top: 7px; }
    .tile-enter {
      grid-column: 1 / -1; grid-row: 3; margin-top: 14px;
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(var(--glow), 0.95);
      opacity: 0.55; transform: translateX(-2px);
      transition: opacity 280ms ease, transform 280ms ease;
    }
    .tile-arrow { width: 15px; height: 15px; transition: transform 280ms cubic-bezier(0.16,1,0.3,1); }
    .tile:hover .tile-enter, .tile:focus-visible .tile-enter { opacity: 1; transform: none; }
    .tile:hover .tile-arrow, .tile:focus-visible .tile-arrow { transform: translateX(4px); }

    /* --- footer / controls legend --- */
    .gallery-foot {
      margin-top: clamp(26px, 4vh, 46px); padding-top: 18px;
      border-top: 1px solid var(--hair);
      display: flex; flex-wrap: wrap; align-items: center; gap: 9px 16px;
      font-size: 12px; color: var(--ink-soft);
    }
    .foot-label {
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint); margin-right: 4px;
    }
    .foot-chip { display: inline-flex; align-items: center; gap: 7px; }
    .foot-chip kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px; color: var(--ink);
      padding: 2px 7px; border-radius: 6px;
      border: 1px solid var(--hair); background: rgba(255,255,255,0.04);
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.3);
    }

    @media (max-width: 560px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      #gallery, .gallery-stage, .tile, .bg-orbits, .bg-stars svg, .bg-body-a, .bg-body-b, .eyebrow-dot {
        animation: none !important; transition: none !important;
      }
      .tile { opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body>
  <canvas id="gpu-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>

  <div id="hud">
    <strong>starforge</strong>
    <button id="btn-pause">Pause</button>
    <button id="btn-slower" title="slower ( , )">«</button>
    <button id="btn-faster" title="faster ( . )">»</button>
    <button id="btn-step" title="single frame-step ( n )">Step</button>
    <button id="btn-rewind" title="rewind to last checkpoint ( z )">↶ Rewind</button>
    <button id="btn-reset">Reset</button>
    <span class="stat">time <b id="stat-rate">1x</b></span>
    <span class="stat"><b id="stat-epoch">T+ 0.0 Myr</b></span>
    <span class="stat">bodies <b id="stat-count">0</b></span>
    <span class="stat">fps <b id="stat-fps">–</b></span>
  </div>

  <div id="guide" class="open">
    <button id="guide-toggle" aria-expanded="true">
      <span>ガイド — <b id="guide-tool-name">つかむ・投げる</b></span>
      <span class="chev">⌄</span>
    </button>
    <div id="guide-body">
      <p id="guide-tool-desc"></p>
      <div id="guide-controls">
        <b>時間</b> スペースで停止／再開・<b>,</b> <b>.</b> で遅く／速く・<b>h</b> ハイパーラプス・<b>n</b> でコマ送り<br>
        <b>やり直し</b> <b>z</b> で少し前に戻す（数秒ごとと操作の直前に自動で記録）<br>
        <b>視点</b> ホイールでズーム・右ドラッグか Shift＋ドラッグで移動・<b>R</b> で最初から<br>
        <b>道具</b> 数字キー <b>1–4</b> か下のボタンで切り替え
      </div>
    </div>
  </div>

  <div id="fallback">Loading…</div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
